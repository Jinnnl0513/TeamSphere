<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient for Primary Chat Bubble -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Gradient for Secondary Chat Bubble -->
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background (Optional, using transparent layout for versatile icons) -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />

  <!-- First Bubble (Top Left) -->
  <path 
    d="M 24 38
       C 24 24, 34 16, 52 16
       C 70 16, 80 24, 80 38
       C 80 52, 70 60, 52 60
       C 46 60, 41 59, 36 57
       L 20 64
       L 24 52
       C 24 48, 24 43, 24 38 Z" 
    fill="url(#primaryGradient)" 
    filter="url(#shadow)" 
  />

  <!-- Second Bubble (Bottom Right, overlaps first) -->
  <path 
    d="M 40 68
       C 40 58, 48 52, 64 52
       C 80 52, 88 58, 88 68
       C 88 78, 80 84, 64 84
       C 60 84, 56 83.5, 52 82
       L 40 88
       L 43 78
       C 41 75, 40 72, 40 68 Z" 
    fill="url(#secondaryGradient)" 
    filter="url(#shadow)" 
  />
  
  <!-- Fun Inner Dots -->
  <circle cx="42" cy="38" r="3.5" fill="#ffffff" opacity="0.8" />
  <circle cx="52" cy="38" r="3.5" fill="#ffffff" opacity="0.8" />
  <circle cx="62" cy="38" r="3.5" fill="#ffffff" opacity="0.8" />
</svg>
